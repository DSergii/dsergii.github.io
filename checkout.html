<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — BuildEye AI</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <style>
    .checkout-wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 64px 24px;
      text-align: center;
    }
    .checkout-wrap h1 { font-size: 1.6rem; margin-bottom: 12px; }
    .checkout-wrap p { color: var(--gray); margin-bottom: 24px; }
    .checkout-status {
      margin-top: 32px;
      font-size: 1.05rem;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      margin: 24px auto;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .success-icon { font-size: 3rem; }
    .btn-block { display: inline-block; margin-top: 20px; }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">
      BuildEye <span class="logo-dot"></span> AI
    </a>
  </header>

  <section class="checkout-wrap">
    <!-- Loading / opening checkout -->
    <div id="loading">
      <h1>Preparing your checkout…</h1>
      <p>You'll be able to complete your purchase in a moment.</p>
      <div class="spinner"></div>
    </div>

    <!-- Success -->
    <div id="success" class="hidden">
      <div class="success-icon">✅</div>
      <h1>Purchase complete!</h1>
      <p>All set — return to the app to continue.</p>
      <a id="returnBtn" href="#" class="btn btn-block">Return to app</a>
    </div>

    <!-- Error -->
    <div id="error" class="hidden">
      <h1>Something went wrong</h1>
      <p id="errorMsg">We couldn't start the checkout. Please try again from the app.</p>
      <a href="index.html" class="btn btn-outline btn-block">Back to home</a>
    </div>
  </section>

  <script>
    // ---- Paddle config (SANDBOX — replace with production values when going live) ----
    const PADDLE_ENV = 'sandbox';
    const PADDLE_TOKEN = 'test_e4bbe3dec673bee290a1902aef2';
    // Subscription prices, keyed by billing cycle then tier.
    const PLAN_PRICE_IDS = {
      monthly: {
        start: 'pri_01ksyjch02fzc5mf0g1fw6bqpe',
        pro: 'pri_01ksyje8sqt9ygjfs6predngfy',
        business: 'pri_01ksyjfqs3s41sh6ky0knaj8xa',
      },
      annual: {
        start: 'pri_01kw4r3g4qmn87dq3xhjwbj1v9',
        pro: 'pri_01kw4r68jh6gpg113yt7k4vm1t',
        business: 'pri_01kw4raa0s4cndj9pgmmjwg6kp',
      },
    };
    // One-time, non-expiring top-up packs, keyed by analysis count.
    const PACK_PRICE_IDS = {
      '25': 'pri_01kw4rhkr2x7sf3t04ex4t4d8d',
      '60': 'pri_01kw4rmmcqkkezvf5f7s13mmz0',
      '120': 'pri_01kw4rtyksfb8qkdemrdt0xr1z',
    };
    // Deep link back into the native app after a successful purchase.
    const RETURN_SCHEME = 'com.warbler.buildeye://subscribed';

    const params = new URLSearchParams(window.location.search);
    const plan = (params.get('plan') || '').toLowerCase();
    const cycle = (params.get('cycle') || 'monthly').toLowerCase() === 'annual' ? 'annual' : 'monthly';
    const pack = (params.get('pack') || '').trim();
    // Signed checkout token (binds the authenticated user). It's the only identity the
    // backend webhook trusts — the old raw `uid` param was unauthenticated and is gone.
    const tok = params.get('tok') || '';
    const email = params.get('email') || '';

    const $ = (id) => document.getElementById(id);
    function show(section) {
      ['loading', 'success', 'error'].forEach((s) => $(s).classList.toggle('hidden', s !== section));
    }
    function fail(msg) {
      if (msg) $('errorMsg').textContent = msg;
      show('error');
    }

    // Resolve what we're selling: a one-time top-up pack, or a subscription on the
    // chosen billing cycle. Top-ups carry { kind:'topup', tok, photos } so the
    // webhook credits the per-user wallet instead of touching subscriptions.
    let priceId, customData;
    if (pack) {
      priceId = PACK_PRICE_IDS[pack];
      customData = { kind: 'topup', photos: Number(pack), ...(tok ? { tok } : {}) };
      if (!priceId) fail('Unknown top-up pack. Please pick a pack in the app and try again.');
    } else if (plan) {
      priceId = (PLAN_PRICE_IDS[cycle] || {})[plan];
      customData = tok ? { tok } : undefined;
      if (!priceId) fail('Unknown or missing plan. Please pick a plan in the app and try again.');
    } else {
      fail('Nothing to check out. Please pick a plan or top-up in the app and try again.');
    }

    if (priceId) {
      // Wire the "Return to app" button to the deep link.
      $('returnBtn').setAttribute('href', RETURN_SCHEME);

      Paddle.Environment.set(PADDLE_ENV);
      Paddle.Initialize({
        token: PADDLE_TOKEN,
        eventCallback: (event) => {
          if (event.name === 'checkout.completed') {
            show('success');
            // Attempt automatic return to the app; the button is the reliable fallback.
            setTimeout(() => { window.location.href = RETURN_SCHEME; }, 800);
          }
        },
      });

      const checkoutOptions = {
        items: [{ priceId, quantity: 1 }],
        customData,
        settings: {
          theme: 'light',
          displayMode: 'overlay',
        },
      };
      if (email) {
        checkoutOptions.customer = { email };
      }

      try {
        Paddle.Checkout.open(checkoutOptions);
      } catch (err) {
        console.error('[checkout] failed to open Paddle', err);
        fail();
      }
    }
  </script>

</body>
</html>
